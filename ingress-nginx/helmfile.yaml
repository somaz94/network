# Hooks to ensure proper installation and upgrades
hooks:
  - events: ["presync"]
    showlogs: true
    command: "kubectl"
    args:
      - "create"
      - "namespace"
      - "ingress-nginx"
      - "--dry-run=client"
      - "-o"
      - "yaml"
      - "||"
      - "true" 