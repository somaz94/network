repositories:
  - name: ingress-nginx
    url: https://kubernetes.github.io/ingress-nginx

releases:
  - name: ingress-nginx
    namespace: ingress-nginx
    chart: ingress-nginx/ingress-nginx
    # -- Version of the ingress-nginx chart to use.
    # -- This should match the version in the Chart.yaml file.
    # -- If you want to use a local chart, you can specify the path to the chart directory.
    version: 4.15.1 # Chart.yaml version reference
    values:
      - values/mgmt.yaml

  - name: ingress-nginx-public-a
    namespace: ingress-nginx
    chart: ingress-nginx/ingress-nginx
    version: 4.15.1
    values:
      - values/mgmt-public-a.yaml

