global:
  image:
    # -- Registry host to pull images from.
    registry: registry.k8s.io
controller:
  service:
    # -- Enable controller services or not. This does not influence the creation of either the admission webhook or the metrics service.
    enabled: true
    type: LoadBalancer
    loadBalancerIP: "192.168.1.55"

  # =============================================================================
  # Metrics & ServiceMonitor (Prometheus)
  # Monitors: request rate, latency, error rate, connection count
  # =============================================================================
  metrics:
    enabled: true
    serviceMonitor:
      enabled: true
      namespace: monitoring
      interval: 30s
      additionalLabels:
        release: kube-prometheus-stack
