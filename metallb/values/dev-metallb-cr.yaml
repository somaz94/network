# =============================================================================
# MetalLB config CRs (somaz94/metallb-cr chart)
# Replaces the former out-of-band `kubectl apply -f metallb-config.yaml` postsync hook.
# L2-only cluster: IPAddressPool + L2Advertisement, no BGP.
# =============================================================================

ipAddressPools:
  - name: ip-pool
    addresses:
      # IP address pool to use (shrunk .76-.79 after NGF migration completed, 2026-04-17)
      # 192.0.2.60 is avoided for bare-metal GitLab (gitlab.example.com)
      # 192.0.2.59 and .61 are reserved (usage unknown, expand later if needed)
      # 192.0.2.80 is a prohibited IP
      # Allocation status: .55 (ngf main), .56-.58, .62-.68 (ngf-public-a..j), .69-.75 reserved
      - 192.0.2.55-192.0.2.58
      - 192.0.2.62-192.0.2.75
    autoAssign: true

l2Advertisements:
  - name: l2-network
    ipAddressPools:
      - ip-pool
