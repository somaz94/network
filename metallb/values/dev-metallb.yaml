# =============================================================================
# MetalLB Custom Values — ServiceMonitor + speaker scheduling
# =============================================================================
prometheus:
  # Required for ServiceMonitor RBAC
  serviceAccount: kube-prometheus-stack-prometheus
  namespace: monitoring

  serviceMonitor:
    enabled: true
    speaker:
      additionalLabels:
        release: kube-prometheus-stack
    controller:
      additionalLabels:
        release: kube-prometheus-stack
    jobLabel: "app.kubernetes.io/name"

# -----------------------------------------------------------------------------
# Speaker DaemonSet — extra tolerations on top of chart defaults.
# Chart's `speaker.tolerations` is APPEND, so chart defaults (`node-role.kubernetes.io/master:NoSchedule`, `node-role.kubernetes.io/control-plane:NoSchedule`) are already in the rendered Pod spec — listing them here only causes duplicates. We add ONLY what's not already covered.
# Prefer specific taints over a wildcard so future dedicated nodes (e.g. GPU) stay excluded unless explicitly added.
# -----------------------------------------------------------------------------
speaker:
  tolerations:
    # Added 2026-05-12 — dedicated=ci-build:NoSchedule on k8s-compute-04 (GitLab Runner builder node) so speaker can BGP/L2-announce LB endpoints that may land here.
    - key: dedicated
      operator: Equal
      value: ci-build
      effect: NoSchedule
  # Explicit pin matching 0.16.0 default (legacy frr sidecar removed from speaker pods).
  # This cluster is L2-only — `frr` and `frr-k8s` are inactive code paths (see comment below).
  frr:
    enabled: false

# -----------------------------------------------------------------------------
# BGP backend — disabled because this cluster is L2-only.
# `metallb-config.yaml` defines only `kind: L2Advertisement` (name: l2-network);
# no `BGPPeer` / `BGPAdvertisement` CRDs exist. Both the legacy `frr` sidecar
# (deprecated in 0.16.0, removed by default) and the new `frr-k8s` daemonset
# (new 0.16.0 default backend) are inactive in this cluster, so we keep them
# both off to avoid an idle frr-k8s daemonset on every node.
# Re-enable only when BGP peers are introduced (`BGPPeer` / `BGPAdvertisement` CRDs).
# -----------------------------------------------------------------------------
frrk8s:
  enabled: false
