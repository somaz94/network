# Deploy MetalLB (bare-metal LoadBalancer) via helmfile, consuming upstream metallb/metallb chart.
# Lifecycle hook: postsync applies IPAddressPool
# Chart version pinned. Bump via ./upgrade.sh after verifying the new release.

repositories:
  - name: metallb
    url: https://metallb.github.io/metallb

releases:
  - name: metallb
    namespace: metallb
    createNamespace: true
    chart: metallb/metallb
    version: 0.15.3
    wait: true
    timeout: 300
    values:
      - values/mgmt.yaml

# Apply MetalLB CRD config (postsync, runs after controller is ready).
# `wait: true` on the release ensures the controller pod is Ready before this hook fires,
# avoiding the validating webhook race that 0.13+ introduced.
hooks:
  - events: ["postsync"]
    showlogs: true
    command: "kubectl"
    args:
      - "apply"
      - "-f"
      - "metallb-config.yaml"
