# NGINX Gateway Fabric controller customization.
# Upstream defaults are kept; only necessary overrides listed here.
#
# Note: GatewayClass / Gateway / NginxProxy resources managed in manifests/
# (applied via helmfile postsync hook), NOT here.

nginxGateway:
  # default: "nginx" → our repo uses "ngf" to coexist with legacy ingress-nginx
  gatewayClassName: ngf

  # chart default is 1; mgmt cluster matches legacy ingress-nginx convention (replicaCount: 1)
  replicas: 1

  # default: true → opt out of product telemetry (privacy)
  productTelemetry:
    enable: false

  # default log level is info; keep default.
  # metrics: default enable=true, port=9113. No override needed.

nginx:
  # chart default is 1; mgmt cluster matches legacy ingress-nginx convention
  replicas: 1
