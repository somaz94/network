# External-DNS Route53 Configuration
image:
  repository: registry.k8s.io/external-dns/external-dns
  pullPolicy: IfNotPresent

serviceAccount:
  create: true
  # No eks.amazonaws.com/role-arn annotation: auth is via EKS Pod Identity association
  # (Terraform aws_eks_pod_identity_association.external_dns, namespace external-dns / SA
  # external-dns, in project/example-app/prod/pod-identity.tf), NOT IRSA. The pod-identity agent
  # injects credentials at admission; the SA needs no role annotation. The legacy IRSA role
  # (mgmt/user-role.tf external_dns_role) is retired as a follow-up.
  #
  # Pre-Pod-Identity IRSA config (kept commented for rollback):
  # annotations:
  #   eks.amazonaws.com/role-arn: arn:aws:iam::123456789012:role/external-dns-role

# Pin to the system node group (label nodegroup-workload=system, ON_DEMAND, no taint)
nodeSelector:
  nodegroup-workload: system

# Pod security settings
podSecurityContext:
  runAsNonRoot: true
  fsGroup: 65534

securityContext:
  privileged: false
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 65532
  runAsGroup: 65532
  capabilities:
    drop: ["ALL"]

rbac:
  create: true

# Resource limits
resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 256Mi

# Logging settings
logLevel: info
logFormat: text

# # Monitor only the example-app namespace
# namespaced: true

# DNS update interval
interval: 5m

# Resource types to monitor
sources:
  - service
  - ingress

# DNS record management policy: create if record does not exist, update if it does
policy: upsert-only

# TXT record registry settings (ownership markers)
registry: txt
txtOwnerId: "example-app-external-dns"
txtPrefix: "external-dns-"

# Domain filter, manage only example.com (Route53 zone <ROUTE53_ZONE_ID>)
domainFilters:
  - example.com

# AWS Route53 provider
provider:
  name: aws

# External-DNS extra settings
extraArgs:
  - --aws-zone-type=public
  - --aws-prefer-cname
  - --annotation-filter=external-dns.example-app.kubernetes.io/hostname
