# Deploy external-dns (AWS Route53 sync) via helmfile, consuming upstream external-dns chart.
# Active component — manages the example.com zone on the prod-example-app-v1 cluster.
# Chart version pinned. Bump via ./upgrade.py after verifying the new release.

repositories:
  - name: external-dns
    url: https://kubernetes-sigs.github.io/external-dns/

releases:
  - name: external-dns
    namespace: external-dns
    createNamespace: true
    chart: external-dns/external-dns
    version: 1.21.1
    values:
      - values/prod.yaml

  # presync hooks: refresh chart deps then ensure namespace exists (idempotent).
hooks:
  # helm dependency update — pulls subchart tarballs declared in Chart.yaml.
  - events: ["presync"]
    showlogs: true
    command: "helm"
    args:
      - "dependency"
      - "update"
      - "."

  # Ensure namespace before sync (kubectl args aren't shell-parsed → use sh -c).
  - events: ["presync"]
    showlogs: true
    command: "sh"
    args:
      - "-c"
      - "kubectl create namespace external-dns 2>/dev/null || true"